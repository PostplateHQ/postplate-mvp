<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PostPlate Growth OS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="pp-shell pp-growth-shell" id="growthAppShell">
    <aside class="pp-sidebar" aria-label="Primary navigation">
      <div class="pp-business-switcher">
        <div class="pp-business-avatar" id="appBusinessAvatar">PP</div>
        <div class="pp-business-copy">
          <p class="pp-business-label">Business</p>
          <button id="appBusinessName" class="pp-business-name" type="button">Your Restaurant</button>
          <p id="appBusinessLocation" class="pp-business-location"><span class="pp-status-dot live"></span> Primary location</p>
        </div>
      </div>

      <nav class="pp-sidebar-nav" id="appSidebarNav">
        <div class="pp-sidebar-group">
          <p class="pp-sidebar-heading">Workspace</p>
          <button class="pp-nav-link" data-route="home" type="button"><span class="pp-nav-icon">◫</span><span>Home</span></button>
          <button class="pp-nav-link" data-route="campaigns" type="button"><span class="pp-nav-icon">◎</span><span>Campaigns</span></button>
          <button class="pp-nav-link" data-route="content-studio" type="button"><span class="pp-nav-icon">✦</span><span>Content Studio</span></button>
          <button class="pp-nav-link" data-route="analytics" type="button"><span class="pp-nav-icon">▣</span><span>Analytics</span></button>
          <button class="pp-nav-link" data-route="settings" type="button"><span class="pp-nav-icon">⌂</span><span>Settings</span></button>
        </div>
      </nav>
    </aside>

    <main class="pp-main">
      <header class="pp-topbar">
        <div class="pp-topbar-search">
          <span class="pp-search-icon">⌕</span>
          <input id="appGlobalSearch" type="search" placeholder="Search actions, campaigns, assets..." />
        </div>
        <div class="pp-topbar-actions">
          <button class="pp-icon-btn" type="button" aria-label="Notifications">◔</button>
          <button class="pp-icon-btn" type="button" aria-label="Activity">⚑</button>
          <button id="appPrimaryCreateButton" class="pp-primary-btn" type="button">Create</button>
          <button class="pp-avatar-btn" type="button" aria-label="Account">VD</button>
        </div>
      </header>

      <section id="appRouteMount" class="pp-growth-route-mount" aria-live="polite"></section>
    </main>
  </div>

  <div id="unifiedCreateModal" class="pp-modal-backdrop hidden" aria-hidden="true" role="dialog" aria-labelledby="unifiedCreateTitle">
    <div class="pp-modal-shell pp-create3-shell">
      <div class="pp-modal-head">
        <div>
          <h3 id="unifiedCreateTitle">Create Campaign</h3>
          <p id="unifiedCreateSubtitle">Owner-first creation flow. Smart suggestions do the heavy lifting.</p>
        </div>
        <button id="unifiedCreateClose" class="pp-modal-close" type="button" aria-label="Close create flow">×</button>
      </div>

      <div class="pp-create3-progress" id="unifiedCreateProgress"></div>
      <div id="unifiedCreateNotice" class="pp-create-offer-notice hidden" aria-live="polite"></div>
      <div id="unifiedCreateBody"></div>

      <div class="pp-modal-footer">
        <button id="unifiedCreateCancel" class="pp-secondary-btn" type="button">Cancel</button>
        <button id="unifiedCreateBack" class="pp-secondary-btn" type="button">Back</button>
        <button id="unifiedCreateNext" class="pp-primary-btn" type="button">Next</button>
      </div>
    </div>
  </div>

  <div id="createImageLightbox" class="pp-modal-backdrop hidden" aria-hidden="true" role="dialog" aria-label="Poster preview image">
    <div class="pp-modal-shell pp-image-lightbox-shell">
      <div class="pp-modal-head">
        <div>
          <h3>Poster Preview</h3>
          <p>Full-size preview for visual review.</p>
        </div>
        <button id="createImageLightboxClose" class="pp-modal-close" type="button" aria-label="Close image preview">×</button>
      </div>
      <div class="pp-image-lightbox-body">
        <img id="createImageLightboxImg" src="" alt="Expanded poster preview" />
      </div>
    </div>
  </div>

  <script src="ui-data-adapter.js"></script>
  <script src="growth-os-app.js"></script>
</body>
</html>
